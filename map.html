<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>서버 지도 - 외대.서버.한국</title>
<link rel="icon" href="favicon.ico" type="image/x-icon"/>
<link rel="apple-touch-icon" href="favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="site.css"/>
<style>
.map-page-hero{max-width:1280px;margin:0 auto;padding:2.75rem clamp(1rem,3vw,1.5rem) 1.25rem;position:relative;z-index:1;}
.map-title-row{display:flex;align-items:center;gap:1.25rem;flex-wrap:nowrap;}
.map-main-title{
  font-family:'Manrope',sans-serif;font-weight:900;
  font-size:clamp(2rem,4.2vw,3.25rem);
  color:var(--primary);margin:0;letter-spacing:-.055em;line-height:1.1;
  white-space:nowrap;flex-shrink:0;
}
.map-main-title em{font-style:normal;color:var(--accent);}
.map-controls{
  display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;
  padding:.45rem .6rem;border-radius:12px;
  background:rgba(255,255,255,.88);
  border:1px solid var(--border-layer);
  box-shadow:0 4px 24px rgba(0,45,86,.06);
  backdrop-filter:saturate(1.1) blur(8px);
}
.map-badge{
  display:inline-flex;align-items:center;gap:.35rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:.38rem .8rem;font-size:.72rem;font-weight:600;color:var(--text-dim);
}
.btn-fullscreen{
  display:inline-flex;align-items:center;gap:.45rem;
  background:var(--accent);color:#fff;font-family:'Manrope',sans-serif;
  font-weight:800;font-size:.74rem;border:none;border-radius:10px;
  padding:.52rem 1rem;cursor:pointer;transition:transform .22s var(--ease),box-shadow .25s var(--ease),filter .2s;text-decoration:none;
  box-shadow:0 4px 20px rgba(141,113,80,.25);
}
.btn-fullscreen:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(141,113,80,.35);filter:brightness(1.05);}
.btn-fullscreen:active{transform:translateY(0);}

.map-bleed{
  width:100%;
  position:relative;
  z-index:1;
  display:flex;
  justify-content:center;
  padding:0 clamp(1rem,3vw,1.5rem);
}
.map-content{
  max-width:1280px;margin:0 auto;
  padding:1rem clamp(1rem,3vw,1.5rem) 3.5rem;
  display:flex;flex-direction:column;gap:1.1rem;flex:1;
  position:relative;z-index:1;
  align-items:center;
}
.map-info{
  display:flex;align-items:center;gap:.65rem;
  background:var(--surface);border:1px solid var(--border-layer);
  border-left:3px solid var(--hufs-gold);border-radius:var(--r-lg);
  padding:.9rem 1.15rem;font-size:.82rem;color:var(--text-dim);line-height:1.85;
  transition:box-shadow .25s var(--ease),transform .25s var(--ease);
  white-space:nowrap;
  box-sizing:border-box;
  width:min(100%,1040px);
}
.map-info:hover{box-shadow:var(--sh-card);transform:translateY(-2px);}
.map-frame-wrap{
  position:relative;border-radius:var(--r-lg);overflow:hidden;
  box-shadow:var(--sh-card-hover);
  background:var(--surface-elev);
  width:min(100%,1040px);
  min-height:min(55vh,560px);
  max-height:min(55vh,560px);
}
.map-frame-wrap::before{
  content:'';position:absolute;inset:0;
  border:1px solid var(--border-layer);border-left:0;border-right:0;z-index:5;pointer-events:none;
}
#map-iframe{width:100%;height:100%;min-height:min(55vh,560px);max-height:min(55vh,560px);border:none;display:block;}
#map-loading{
  position:absolute;inset:0;background:var(--surface);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  transition:opacity .4s;z-index:10;
}
#map-loading.hidden{opacity:0;pointer-events:none;}

body{display:flex;flex-direction:column;min-height:100vh;}

/* site.css의 .reveal(opacity+transition+IO방식)과 충돌 방지 — 독립 클래스로 분리 */
.map-reveal{animation:fadeUp .5s both;}

@media(max-width:900px){
  .map-main-title{white-space:normal;}
  .map-title-row{flex-wrap:wrap;}
  .map-bleed{padding:0 clamp(.75rem,2vw,1rem);}
  .map-frame-wrap{width:100%;}
  .map-frame-wrap,#map-iframe{min-height:min(52vh,460px);max-height:min(52vh,460px);}
  .map-info{white-space:normal;width:100%;}
}
@media(max-width:640px){
  .map-frame-wrap,#map-iframe{min-height:min(46vh,340px);max-height:min(46vh,340px);}
}
</style>
</head>
<body>

<nav class="site-nav" id="mnav">
  <div class="nav-i">
    <a href="index.html" class="nav-logo"><span class="nav-dot"></span>외대.서버.한국</a>
    <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="메뉴 열기">
      <i class="msym msym-nav">menu</i>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="nl">홈</a>
      <a href="mod-setup.html" class="nl">모드 설정</a>
      <a href="updates.html" class="nl">업데이트 내역</a>
      <a href="notices.html" class="nl">공지사항</a>
      <a href="map.html" class="nl nl-act">서버 지도</a>
    </div>
  </div>
</nav>

<div class="map-page-hero map-reveal" style="padding-bottom:1.75rem;">
  <div class="map-title-row">
    <h1 class="map-main-title"><em>서버 지도</em></h1>
    <div class="map-controls">
      <span class="map-badge"><i class="msym msym-sm" style="color:var(--hufs-navy);">public</i>야생 · 건축 · 캠퍼스</span>
      <span class="map-badge"><i class="msym msym-sm" style="color:var(--success);">travel_explore</i>실시간 지도 · BlueMap</span>
      <a href="/map/" target="_blank" rel="noopener" class="btn-fullscreen"><i class="msym msym-sm">open_in_full</i>전체화면</a>
    </div>
  </div>
</div>

<div class="map-bleed">
  <div class="map-frame-wrap map-reveal">
    <div id="map-loading">
      <i class="msym msym-2xl spin" style="color:var(--hufs-gold);">travel_explore</i>
      <span class="font-display fw-700 fs-sm c-muted">지도 불러오는 중...</span>
    </div>
    <iframe id="map-iframe" src="/map/" title="외대.서버.한국 서버 지도" allowfullscreen loading="lazy" onload="document.getElementById('map-loading').classList.add('hidden')"></iframe>
  </div>
</div>

<div class="map-content">
  <div class="map-info map-reveal">
    <i class="msym msym-md c-gold flex-shrink-0" style="margin-top:2px;">info</i>
    <span>야생 월드, 개인 건축 월드, 서울·글로벌 캠퍼스를 포함한 서버 전체 지도입니다. 새로 개척하거나 건축한 지역은 잠시 후 자동 반영됩니다.</span>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-i">
    <p>© 2026 외대.서버.한국. All rights reserved.</p>
    <a href="admin.html">Admin</a>
  </div>
</footer>

<script>
(function(){
  const t=document.getElementById('nav-toggle'),links=document.getElementById('nav-links');
  if(!t||!links)return;
  t.addEventListener('click',()=>{
    const o=!links.classList.contains('open');
    links.classList.toggle('open',o);
    t.setAttribute('aria-expanded',o);
    t.setAttribute('aria-label',o?'메뉴 닫기':'메뉴 열기');
    document.body.classList.toggle('nav-open',o);
  });
  links.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{
    links.classList.remove('open');
    t.setAttribute('aria-expanded','false');
    t.setAttribute('aria-label','메뉴 열기');
    document.body.classList.remove('nav-open');
  }));
})();
window.addEventListener('scroll',()=>document.getElementById('mnav')?.classList.toggle('scrolled',scrollY>16),{passive:true});
</script>
</body>
</html>
