<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>업데이트 내역 - 외대.서버.한국</title>
<link rel="icon" href="favicon.ico" type="image/x-icon"/>
<link rel="apple-touch-icon" href="favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="site.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
main{flex:1;max-width:1280px;margin:0 auto;padding:2.75rem clamp(1.25rem,4vw,2.5rem) 5rem;width:100%;position:relative;z-index:1;}
body{display:flex;flex-direction:column;min-height:100vh;}
.page-top{display:grid;grid-template-columns:1fr auto;align-items:flex-end;gap:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border-layer);margin-bottom:2rem;}
.page-accent{display:flex;align-items:center;gap:.65rem;margin-bottom:.75rem;}
.page-accent-bar{width:3px;height:40px;background:var(--accent);border-radius:2px;}
.page-lead{color:var(--text-dim);font-size:.88rem;margin:0;max-width:520px;line-height:1.75;}
.ver-card{
  background:var(--surface);
  border-radius:var(--r-lg);
  padding:1.15rem 1.45rem;
  text-align:right;
  flex-shrink:0;
  border:1px solid var(--border-layer);
  box-shadow:0 1px 3px rgba(0,45,86,.06);
  transition:transform .25s var(--ease),box-shadow .25s var(--ease),border-color .25s var(--ease);
}
.ver-card:hover{transform:translateY(-3px);box-shadow:var(--sh-card-hover);border-color:var(--border-strong);}
.ver-card .vl{display:block;font-size:.58rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-family:'Manrope',sans-serif;}
.ver-card #current-version{font-family:'Manrope',sans-serif;font-weight:900;font-size:1.85rem;color:var(--primary);letter-spacing:-.05em;line-height:1;}
.update-item{background:var(--surface);border:1px solid var(--border-layer);border-radius:var(--r-lg);overflow:hidden;position:relative;transition:box-shadow .28s var(--ease),transform .25s var(--ease),border-color .25s var(--ease);box-shadow:0 1px 3px rgba(0,45,86,.05);}
.update-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
.update-item:hover{box-shadow:var(--sh-card-hover);border-color:rgba(141,113,80,.28);transform:translateY(-4px);}
.update-item:active{transform:translateY(-2px);}
.update-hd{display:flex;align-items:center;gap:.75rem;padding:1.1rem 1.35rem 1.1rem 1.55rem;cursor:pointer;user-select:none;transition:background .22s var(--ease);}
.update-hd:hover{background:var(--surface-elev);}
.update-hd:active{background:rgba(0,45,86,.05);}
.update-body{max-height:0;overflow:hidden;transition:max-height .45s ease,padding .28s ease;padding:0 1.35rem 0 1.55rem;font-size:.88rem;color:var(--text-dim);line-height:1.92;white-space:pre-line;border-top:0 solid var(--border-layer);}
.update-item.open .update-body{max-height:1600px;padding:.95rem 1.35rem 1.45rem 1.55rem;border-top-width:1px;}
.update-item .chev{transition:transform .25s;font-size:22px;color:var(--muted);flex-shrink:0;}
.update-item.open .chev{transform:rotate(180deg);color:var(--accent);}
.ver-pill{display:inline-flex;align-items:center;background:var(--primary-soft);color:var(--primary);font-family:'Manrope',sans-serif;font-weight:800;font-size:.72rem;padding:5px 14px;border-radius:99px;letter-spacing:-.01em;border:1px solid var(--border-strong);}
.latest-badge{background:var(--success-soft);color:#15803d;font-size:.62rem;font-weight:800;padding:4px 10px;border-radius:99px;letter-spacing:.04em;font-family:'Manrope',sans-serif;border:1px solid rgba(34,197,94,.35);}
.date-line{font-size:.68rem;color:var(--text-dim);font-weight:700;font-family:'Manrope',sans-serif;white-space:nowrap;}
.update-stack{display:flex;flex-direction:column;gap:1rem;}
@media(max-width:720px){
  .page-top{grid-template-columns:1fr;}
  .ver-card{text-align:left;}
}
</style>
</head>
<body>

<nav class="site-nav" id="mnav">
  <div class="nav-i">
    <a href="index.html" class="nav-logo"><span class="nav-dot"></span>외대.서버.한국</a>
    <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="메뉴 열기">
      <i class="msym msym-nav">menu</i>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="nl">홈</a>
      <a href="mod-setup.html" class="nl">모드 설정</a>
      <a href="updates.html" class="nl nl-act">업데이트 내역</a>
      <a href="notices.html" class="nl">공지사항</a>
      <a href="map.html" class="nl">서버 지도</a>
    </div>
  </div>
</nav>

<main>
  <div class="page-top reveal">
    <div>
      <div class="page-accent">
        <div class="page-accent-bar"></div>
        <h1 class="page-title">업데이트 내역</h1>
      </div>
      <p class="page-lead">기능 발전과 패치 기록입니다. 항목을 눌러 상세 내용을 펼칠 수 있습니다.</p>
    </div>
    <div class="ver-card">
      <span class="vl">현재 서버 버전</span>
      <span id="current-version">—</span>
    </div>
  </div>

  <div id="updates-list" class="reveal">
    <div class="loading-row">
      <i class="msym spin">progress_activity</i> 불러오는 중...
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-i">
    <p>© 2026 외대.서버.한국. All rights reserved.</p>
    <a href="admin.html" style="display:none;" aria-hidden="true">Admin</a>
  </div>
</footer>

<script>
/* SB_URL / SB_KEY는 config.js에서 로드됩니다 */
const sb=supabase.createClient(SB_URL,SB_KEY);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDate=s=>{if(!s)return'';const d=new Date(s);return isNaN(d)?'':d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});};

(function(){
  const t=document.getElementById('nav-toggle'),links=document.getElementById('nav-links');
  if(!t||!links)return;
  t.addEventListener('click',()=>{
    const o=!links.classList.contains('open');
    links.classList.toggle('open',o);
    t.setAttribute('aria-expanded',o);
    t.setAttribute('aria-label',o?'메뉴 닫기':'메뉴 열기');
    document.body.classList.toggle('nav-open',o);
  });
  links.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{
    links.classList.remove('open');
    t.setAttribute('aria-expanded','false');
    t.setAttribute('aria-label','메뉴 열기');
    document.body.classList.remove('nav-open');
  }));
})();
window.addEventListener('scroll',()=>document.getElementById('mnav')?.classList.toggle('scrolled',scrollY>16),{passive:true});
const io=new IntersectionObserver((ents)=>{ents.forEach(e=>{if(e.isIntersecting){e.target.classList.add('reveal-in');io.unobserve(e.target);}});},{threshold:.1,rootMargin:'0px 0px -36px 0px'});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

window.toggleUpdate=function(id){
  document.querySelector('[data-uid="'+id+'"]')?.classList.toggle('open');
};

async function loadUpdates(){
  const el=document.getElementById('updates-list');
  const{data,error}=await sb.from('updates').select('*').order('release_date',{ascending:false});
  if(error){
    el.innerHTML=`<div class="update-item p-lg text-center"><p class="c-dim fs-base mb-0">불러오기에 실패했습니다. 잠시 후 다시 시도해 주세요.</p></div>`;
    return;
  }
  if(!data?.length){
    el.innerHTML=`<div class="update-item p-lg text-center"><p class="font-display fw-800 c-navy mb-xs" style="font-size:1.05rem;">아직 업데이트 내역이 없습니다</p><p class="c-dim mb-0" style="font-size:.84rem;">관리자에서 기록을 추가한 뒤 표시됩니다.</p></div>`;
    return;
  }
  const verEl=document.getElementById('current-version');
  /* 최신 버전 표시: version 누락 시 fallback 문구 */
  const latest=data.find(r=>r.version?.trim());
  if(verEl)verEl.textContent=latest?.version??'—';
  el.innerHTML=`<div class="update-stack">`+
    data.map((row,i)=>`
    <div class="update-item fu" data-uid="${row.id}" style="animation-delay:${i*.05}s">
      <div class="update-hd" onclick="toggleUpdate('${row.id}')">
        <i class="msym msym-md c-gold flex-shrink-0">history_edu</i>
        <div class="flex-1 min-w-0">
          <div class="d-flex align-center flex-wrap" style="gap:.5rem;margin-bottom:4px;">
            <span class="ver-pill">${row.version?.trim()?esc(row.version):'<span style="opacity:.55;font-style:italic;">버전 미입력</span>'}</span>
            ${i===0?`<span class="latest-badge">최신</span>`:''}
          </div>
          <p class="font-display fw-800 c-navy truncate" style="font-size:.98rem;letter-spacing:-.025em;margin:0;">${esc(row.title)||'<span style="opacity:.55;font-style:italic;">제목 없음</span>'}</p>
        </div>
        <span class="date-line">${row.release_date?fmtDate(row.release_date):'<span style="opacity:.5;">날짜 미입력</span>'}</span>
        <i class="msym chev">expand_more</i>
      </div>
      <div class="update-body">${row.content?esc(row.content):'<span style="opacity:.7;">상세 내용이 없습니다.</span>'}</div>
    </div>`).join('')+`</div>`;
}
loadUpdates();
</script>
</body>
</html>
