<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>업데이트 내역 - 외대.서버.한국</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #F9F9F7; margin: 0; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.9s linear infinite; display: inline-block; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .fu { animation: fadeUp 0.45s both; }

  .update-card {
    background: #FFFFFF;
    border: 1px solid rgba(0,55,100,0.09);
    border-left: 3px solid #C4972A;
    border-radius: 12px;
    padding: 1.75rem 2rem;
    transition: box-shadow 0.18s, transform 0.18s;
  }
  .update-card:hover { box-shadow: 0 4px 20px rgba(0,55,100,0.09); transform: translateY(-1px); }

  .update-card.latest {
    border-left-color: #003764;
  }

  .nav-links { display:flex; gap:1.75rem; align-items:center; }
  .page-header-grid { display:grid; grid-template-columns:1fr auto; align-items:flex-end; gap:2rem; }

  @media (max-width: 640px) {
    .nav-links a:not(:last-child):not(:first-child) { display:none; }
    .nav-links { gap:1rem; }
    main { padding:80px 1rem 3rem !important; }
    .page-header-grid { grid-template-columns:1fr; }
    .version-badge { align-self:flex-start; text-align:left !important; }
    .update-card { padding:1.25rem 1.25rem !important; }
  }
</style>
</head>
<body>

<!-- Nav -->
<nav style="background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,55,100,0.08);position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 1px 10px rgba(0,55,100,0.06);">
  <div style="max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;height:60px;">
    <a href="index.html" style="font-family:'Manrope',sans-serif;font-weight:900;font-size:1.1rem;color:#003764;text-decoration:none;letter-spacing:-0.03em;">외대.서버.한국</a>
    <div class="nav-links">
      <a href="index.html"     style="font-family:'Manrope',sans-serif;font-weight:700;font-size:0.875rem;color:#6b7280;text-decoration:none;" onmouseover="this.style.color='#003764'" onmouseout="this.style.color='#6b7280'">홈</a>
      <a href="mod-setup.html" style="font-family:'Manrope',sans-serif;font-weight:700;font-size:0.875rem;color:#6b7280;text-decoration:none;" onmouseover="this.style.color='#003764'" onmouseout="this.style.color='#6b7280'">모드 설정</a>
      <a href="updates.html"   style="font-family:'Manrope',sans-serif;font-weight:700;font-size:0.875rem;color:#003764;text-decoration:none;border-bottom:2px solid #003764;padding-bottom:1px;">업데이트 내역</a>
    </div>
  </div>
</nav>

<main style="max-width:1200px;margin:0 auto;padding:100px 2rem 5rem;">

  <!-- Page header -->
  <section class="page-header-grid" style="margin-bottom:2.5rem;">
    <div>
      <div style="width:44px;height:3px;background:#C4972A;border-radius:2px;margin-bottom:0.9rem;"></div>
      <h1 style="font-family:'Manrope',sans-serif;font-weight:900;font-size:clamp(2.2rem,4.5vw,3.2rem);color:#003764;margin:0 0 0.75rem;letter-spacing:-0.04em;line-height:1.05;">업데이트 내역</h1>
      <p style="color:#9EA2A2;font-size:0.92rem;margin:0;max-width:480px;line-height:1.65;">외대.서버.한국의 기능 발전 기록입니다. 새롭게 추가된 기능과 개선 사항들을 버전별로 확인하실 수 있습니다.</p>
    </div>
    <!-- Version badge -->
    <div class="version-badge" style="background:#FFFFFF;border:1px solid rgba(0,55,100,0.10);border-left:3px solid #003764;border-radius:10px;padding:1rem 1.5rem;text-align:right;flex-shrink:0;">
      <span style="display:block;font-size:0.66rem;font-weight:800;color:#9EA2A2;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px;">현재 서버 버전</span>
      <span id="current-version" style="font-family:'Manrope',sans-serif;font-weight:900;font-size:1.6rem;color:#003764;letter-spacing:-0.03em;">—</span>
    </div>
  </section>

  <!-- List -->
  <div id="updates-list">
    <div style="display:flex;align-items:center;justify-content:center;padding:4rem 0;color:#9EA2A2;gap:8px;font-size:0.88rem;">
      <span class="material-symbols-outlined spin">progress_activity</span> 불러오는 중...
    </div>
  </div>
</main>

<!-- Footer -->
<footer style="background:#F4F4F2;border-top:1px solid rgba(0,55,100,0.08);padding:2.25rem 2rem;">
  <div style="max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:0.75rem;">
    <p style="color:#9EA2A2;font-size:0.8rem;margin:0;">© 2024 외대.서버.한국. All rights reserved.</p>
    <a href="admin.html" style="font-family:'Manrope',sans-serif;font-weight:700;font-size:0.82rem;color:#003764;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">Admin</a>
  </div>
</footer>

<script>
  const SUPABASE_URL = 'https://ggdzsdhpjamgvsrpxspg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdnZHpzZGhwamFtZ3ZzcnB4c3BnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDE2MDAsImV4cCI6MjA4OTU3NzYwMH0.Bfl4A2PDughSw_Loc918IgVSWWsfkyzNtUxlFP7rLVo';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(s) {
    if (!s) return '';
    return new Date(s).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
  }

  async function loadUpdates() {
    const el = document.getElementById('updates-list');
    const { data, error } = await sb.from('updates').select('*').order('release_date', { ascending: false });

    if (error) {
      el.innerHTML = `<div class="update-card" style="text-align:center;"><p style="color:#9EA2A2;font-size:0.9rem;margin:0;">불러오기에 실패했습니다. 잠시 후 다시 시도해 주세요.</p></div>`;
      return;
    }
    if (!data || data.length === 0) {
      el.innerHTML = `<div class="update-card" style="text-align:center;padding:3rem;">
        <p style="font-family:'Manrope',sans-serif;font-weight:800;font-size:1.15rem;color:#003764;margin:0 0 0.4rem;">아직 업데이트 내역이 없습니다.</p>
        <p style="color:#9EA2A2;font-size:0.86rem;margin:0;">관리자에서 기록을 추가한 뒤 표시됩니다.</p>
      </div>`;
      return;
    }

    const verEl = document.getElementById('current-version');
    if (verEl) verEl.textContent = data[0].version;

    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:1rem;">` +
      data.map((row, i) => `
        <article class="update-card ${i===0?'latest':''} fu" style="animation-delay:${i*0.055}s">
          <div style="display:flex;flex-wrap:wrap;gap:0.6rem;align-items:center;justify-content:space-between;margin-bottom:0.9rem;">
            <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
              <span style="display:inline-flex;align-items:center;background:#003764;color:#FFFFFF;font-family:'Manrope',sans-serif;font-weight:800;font-size:0.75rem;padding:3px 11px;border-radius:99px;letter-spacing:-0.01em;">${esc(row.version)}</span>
              ${i===0 ? '<span style="background:#16a34a;color:#FFFFFF;font-size:0.68rem;font-weight:800;padding:3px 9px;border-radius:99px;letter-spacing:0.04em;font-family:\'Manrope\',sans-serif;">최신</span>' : ''}
            </div>
            <span style="font-size:0.8rem;color:#9EA2A2;">${fmtDate(row.release_date)}</span>
          </div>
          <h2 style="font-family:'Manrope',sans-serif;font-weight:800;font-size:1.05rem;color:#003764;margin:0 0 0.5rem;letter-spacing:-0.02em;">${esc(row.title)}</h2>
          ${row.content ? `<p style="color:#555;font-size:0.875rem;line-height:1.7;margin:0;white-space:pre-line;">${esc(row.content)}</p>` : ''}
        </article>
      `).join('') + `</div>`;
  }

  loadUpdates();
</script>
</body>
</html>
