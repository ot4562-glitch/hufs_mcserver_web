<!-- 로그인 화면 -->

    <button onclick="loginWithGoogle()"

        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>

<!-- 대시보드 -->

<nav class="bg-white/70 backdrop-blur-md border-b border-slate-200/20 shadow-sm fixed top-0 z-50 w-full">

          <div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
          <span id="server-enabled-label" class="ml-3 text-sm font-bold text-primary">가동</span>

        type="button"

<main class="pt-24 pb-20 max-w-7xl mx-auto px-8">
  <header class="mb-12">
    <h1 class="text-[3.5rem] font-extrabold text-primary leading-tight tracking-tight mb-2">관리자 대시보드</h1>
    <p class="text-secondary text-lg max-w-2xl">서버 환경을 관리합니다.</p>
  </header>
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-8 space-y-8">
      <section class="bg-surface-container-low p-8 rounded-lg">
        <div class="flex items-center justify-between mb-8">
          <div><h2 class="text-2xl font-bold text-primary mb-1">업데이트 로그 관리</h2><p class="text-sm text-secondary">버전 배포와 주요 변경 사항을 기록합니다.</p></div>
          <span class="material-symbols-outlined text-primary text-3xl">history_edu</span>
        </div>
        <form class="space-y-6" onsubmit="submitUpdate(event)">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2"><label class="text-xs font-bold text-secondary uppercase tracking-widest px-1">버전 태그</label><input id="input-version" class="w-full bg-surface-container-lowest border-none p-4 rounded-md focus:ring-2 focus:ring-primary text-on-surface" placeholder="예: v2.4.0-Release" type="text" required/></div>
            <div class="space-y-2"><label class="text-xs font-bold text-secondary uppercase tracking-widest px-1">배포 날짜</label><input id="input-date" class="w-full bg-surface-container-lowest border-none p-4 rounded-md focus:ring-2 focus:ring-primary text-on-surface" type="date" required/></div>
          </div>
          <div class="space-y-2"><label class="text-xs font-bold text-secondary uppercase tracking-widest px-1">로그 제목</label><input id="input-title" class="w-full bg-surface-container-lowest border-none p-4 rounded-md focus:ring-2 focus:ring-primary text-on-surface" placeholder="주요 변경 사항 요약" type="text" required/></div>
          <div class="space-y-2"><label class="text-xs font-bold text-secondary uppercase tracking-widest px-1">상세 내용</label><textarea id="input-content" class="w-full bg-surface-container-lowest border-none p-4 rounded-md focus:ring-2 focus:ring-primary text-on-surface resize-none" placeholder="변경 사항을 상세히 기록해 주세요." rows="6"></textarea></div>
          <div id="submit-msg" class="hidden text-sm font-bold px-4 py-3 rounded-md"></div>
          <div class="flex justify-end pt-4">
            <button id="submit-btn" class="bg-primary-container text-on-primary px-10 py-4 rounded-md font-bold hover:bg-primary transition-all flex items-center gap-2 shadow-sm" type="submit">
              <span class="material-symbols-outlined">publish</span> 변경 게시
            </button>
          </div>
        </form>

        <!-- 기존 로그 목록 -->
        <div class="mt-10 pt-8 border-t border-surface-container-high">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold text-primary">게시된 로그</h3>
            <button onclick="loadAdminLogs()" type="button" class="text-xs text-secondary hover:text-primary flex items-center gap-1 transition-all">
              <span class="material-symbols-outlined" style="font-size:16px;">refresh</span> 새로고침
            </button>
          </div>
          <div id="admin-log-list" class="space-y-3">
            <p class="text-sm text-secondary">불러오는 중...</p>
          </div>
        </div>
      </section>
    </div>
    <div class="lg:col-span-4 space-y-8">
      <section class="bg-secondary-fixed p-8 rounded-lg h-fit">
        <div class="flex items-center gap-3 mb-6">
          <span class="material-symbols-outlined text-on-secondary-fixed-variant">settings_input_component</span>
          <h2 class="text-xl font-bold text-on-secondary-fixed">환경 설정</h2>
        </div>
        <div class="space-y-6">
          <div class="space-y-2">
            <label class="text-xs font-bold text-on-secondary-fixed-variant uppercase tracking-widest">마크 서버 공개 버전</label>
            <p class="text-xs text-on-secondary-fixed-variant/70 mb-2">홈 화면에 표시됩니다.</p>
            <div class="flex gap-3 items-center">
              <input
                id="public-mc-version-input"
                class="w-full bg-surface-container-lowest border-none p-4 rounded-md focus:ring-2 focus:ring-primary text-on-surface font-bold"
                placeholder="예: 1.21.11"
                type="text"
              />
              <button
                type="button"
                onclick="applyPublicMinecraftVersion()"
                class="whitespace-nowrap px-5 py-4 bg-secondary text-white font-bold rounded-md hover:bg-on-secondary-fixed-variant transition-all shadow-sm"
              >
                확인
              </button>
            </div>
          </div>
        </div>
      </section>
      <section class="space-y-4">
        <div class="bg-surface-container-lowest p-6 rounded-lg shadow-sm border-l-[3px] border-primary-fixed-dim">
          <div class="text-sm font-bold text-secondary uppercase tracking-widest mb-1">서버 상태</div>
          <div id="admin-server-status-text" class="text-4xl font-extrabold text-primary font-['Manrope']">가동</div>
          <div class="mt-2 text-sm text-secondary">
            공개 버전: <span id="admin-public-version-text" class="font-bold text-on-surface"></span>
          </div>
        </div>
      </section>
    </div>
  </div>
</main>

<footer class="bg-[#f4f4f2] w-full py-12 px-8">
  <div class="flex flex-col md:flex-row justify-between items-center gap-4 max-w-7xl mx-auto">
    <div class="font-['Inter'] text-sm text-slate-500">© 2024 외대.서버.한국. All rights reserved.</div>
    <div class="flex gap-8"><span class="font-bold text-[#004098] font-['Inter'] text-sm">관리자</span></div>
  </div>
</footer>
 </div>
<script>
  // WARNING: 이 키는 프론트엔드에 노출됩니다. 실제 운영에서는 RLS/서버 검증을 꼭 권장합니다.
  const SUPABASE_URL = 'https://ggdzsdhpjamgvsrpxspg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdnZHpzZGhwamFtZ3ZzcnB4c3BnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDE2MDAsImV4cCI6MjA4OTU3NzYwMH0.Bfl4A2PDughSw_Loc918IgVSWWsfkyzNtUxlFP7rLVo';
  const ALLOWED_EMAIL = 'ot4562@gmail.com';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  async function checkAuth() {
    const authScreen = document.getElementById('auth-screen');
    const dashboard = document.getElementById('dashboard');
    if (!authScreen || !dashboard) return;

    const { data: { session } } = await sb.auth.getSession();
    const email = session?.user?.email;
    const ok = !!(email && email === ALLOWED_EMAIL);

    authScreen.style.display = ok ? 'none' : 'flex';
    dashboard.style.display = ok ? 'block' : 'none';
  }

  async function loginWithGoogle() {
    await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
  }

  async function logout() {
    await sb.auth.signOut();
    await checkAuth();
  }

  window.loginWithGoogle = loginWithGoogle;
  window.logout = logout;

  // 서버 상태/버전 저장 로직(localStorage)
  const STORAGE_SERVER_ENABLED = 'serverEnabled';
  const STORAGE_PUBLIC_MC_VERSION = 'publicMinecraftVersion';
  const DEFAULT_SERVER_ENABLED = true;
  const DEFAULT_PUBLIC_MC_VERSION = '1.21.11';

  function getServerEnabled() {
    const raw = localStorage.getItem(STORAGE_SERVER_ENABLED);
    if (raw === null) return DEFAULT_SERVER_ENABLED;
    return raw === 'true';
  }

  function getPublicMinecraftVersion() {
    const raw = localStorage.getItem(STORAGE_PUBLIC_MC_VERSION);
    return raw ? raw : DEFAULT_PUBLIC_MC_VERSION;
  }

  function renderAdminUI() {
    const enabled = getServerEnabled();
    const toggle = document.getElementById('server-enabled-toggle');
    const enabledLabel = document.getElementById('server-enabled-label');
    const statusText = document.getElementById('admin-server-status-text');
    const versionInput = document.getElementById('public-mc-version-input');
    const versionText = document.getElementById('admin-public-version-text');

    if (!toggle || !enabledLabel || !statusText || !versionInput || !versionText) return;

    toggle.checked = enabled;
    enabledLabel.textContent = enabled ? '가동' : '점검';
    statusText.textContent = enabled ? '가동' : '점검 중';

    const v = getPublicMinecraftVersion();
    versionInput.value = v;
    versionText.textContent = v;
  }

  window.applyPublicMinecraftVersion = function () {
    const input = document.getElementById('public-mc-version-input');
    if (!input) return;

    const v = input.value.trim();
    if (!v) return;

    localStorage.setItem(STORAGE_PUBLIC_MC_VERSION, v);
    renderAdminUI();
  };

  (function init() {
    const toggle = document.getElementById('server-enabled-toggle');
    if (!toggle) return;

    renderAdminUI();

    toggle.addEventListener('change', function () {
      localStorage.setItem(STORAGE_SERVER_ENABLED, this.checked ? 'true' : 'false');
      renderAdminUI();
    });

    window.addEventListener('storage', function (e) {
      if (e.key === STORAGE_SERVER_ENABLED || e.key === STORAGE_PUBLIC_MC_VERSION) {
        renderAdminUI();
      }
    });
  })();

  // ── 업데이트 로그 게시 ──────────────────────────────
  async function submitUpdate(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('submit-msg');
    const version = document.getElementById('input-version').value.trim();
    const date    = document.getElementById('input-date').value;
    const title   = document.getElementById('input-title').value.trim();
    const content = document.getElementById('input-content').value.trim();

    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined">progress_activity</span> 게시 중...';

    const { error } = await sb.from('updates').insert({ version, release_date: date, title, content });

    if (error) {
      msg.textContent = '❌ 오류: ' + error.message;
      msg.className = 'text-sm font-bold px-4 py-3 rounded-md bg-red-50 text-red-700';
    } else {
      msg.textContent = '✅ 성공적으로 게시되었습니다.';
      msg.className = 'text-sm font-bold px-4 py-3 rounded-md bg-emerald-50 text-emerald-700';
      e.target.reset();
      loadAdminLogs();
    }

    msg.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">publish</span> 변경 게시';
    setTimeout(() => msg.classList.add('hidden'), 4000);
  }
  window.submitUpdate = submitUpdate;

  // ── 게시된 로그 목록 (관리자용) ──────────────────────
  async function loadAdminLogs() {
    const container = document.getElementById('admin-log-list');
    if (!container) return;

    const { data, error } = await sb
      .from('updates')
      .select('*')
      .order('release_date', { ascending: false });

    if (error || !data || data.length === 0) {
      container.innerHTML = '<p class="text-sm text-secondary">게시된 로그가 없습니다.</p>';
      return;
    }

    container.innerHTML = data.map(row => `
      <div class="flex items-start justify-between gap-4 p-4 bg-surface-container-lowest rounded-lg">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-0.5">
            <span class="text-xs font-bold text-primary bg-primary/10 px-2 py-0.5 rounded">${escHtml(row.version)}</span>
            <span class="text-xs text-secondary">${row.release_date ?? ''}</span>
          </div>
          <p class="font-bold text-sm truncate">${escHtml(row.title)}</p>
          ${row.content ? `<p class="text-xs text-secondary mt-0.5">${escHtml(row.content)}</p>` : ''}
        </div>
        <button onclick="deleteLog('${row.id}')" type="button"
          class="shrink-0 text-secondary hover:text-error transition-all" title="삭제">
          <span class="material-symbols-outlined" style="font-size:20px;">delete</span>
        </button>
      </div>
    `).join('');
  }
  window.loadAdminLogs = loadAdminLogs;

  async function deleteLog(id) {
    if (!confirm('이 로그를 삭제할까요?')) return;
    const { error } = await sb.from('updates').delete().eq('id', id);
    if (!error) loadAdminLogs();
  }
  window.deleteLog = deleteLog;

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 인증 상태 변화 시 대시보드 & 로그 목록 갱신
  sb.auth.onAuthStateChange(function(event, session) {
    checkAuth();
    if (session) loadAdminLogs();
  });

  checkAuth();
</script>
</body></html>
