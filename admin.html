<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>외대.서버.한국 - 관리자 대시보드</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "hufs-navy":  "#003764",
          "hufs-gold":  "#C4972A",
          "hufs-gray":  "#9EA2A2",
          "hufs-light": "#F4F4F4",
        }
      }
    }
  }
</script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #F9F9F7; margin: 0; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  h1, h2, h3 { font-family: 'Manrope', sans-serif; }

  /* toggle */
  .toggle-track { width:44px;height:24px;background:#D1D5DB;border-radius:99px;position:relative;transition:background .2s;cursor:pointer; }
  .toggle-track.on { background:#003764; }
  .toggle-thumb { width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.18); }
  .toggle-track.on .toggle-thumb { transform:translateX(20px); }

  @keyframes ping { 75%,100%{transform:scale(2);opacity:0} }

  input[type=text], input[type=date], textarea {
    width:100%; background:#F4F4F4; border:1px solid rgba(0,55,100,0.12);
    padding:0.85rem 1rem; border-radius:8px;
    font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; color:#003764;
    outline:none; transition:border-color .15s, box-shadow .15s;
  }
  input[type=text]:focus, input[type=date]:focus, textarea:focus {
    border-color:#003764; box-shadow:0 0 0 3px rgba(0,55,100,0.10);
  }

  /* 반응형 그리드 */
  .env-row { display:flex; align-items:center; gap:2rem; flex-wrap:wrap; }
  .version-block { display:flex; align-items:center; gap:0.75rem; flex:0 0 auto; width:320px; }
  .version-block input[type=text] { width:130px; flex:none; }
  .main-grid { display:grid; grid-template-columns:1fr 460px; gap:1.5rem; align-items:start; }

  @media (max-width: 960px) {
    .main-grid { grid-template-columns:1fr; }
    .version-block { width:100%; }
    .version-block input[type=text] { flex:1; width:auto; }
  }
  @media (max-width: 640px) {
    main { padding:76px 1rem 3rem !important; }
    .env-row { flex-direction:column; align-items:stretch; gap:0.9rem; }
    .version-block { flex-direction:column; align-items:stretch; width:100%; }
    .version-block input[type=text] { width:100%; }
    .version-block button { width:100%; padding:0.75rem !important; text-align:center; justify-content:center; }
    .env-toggle-box { width:100% !important; }
    nav .nav-desktop { display:none !important; }
    nav .nav-mobile-logout { display:flex !important; }
  }

  /* 로그 아코디언 */
  .log-item { background:#F4F4F4; border-radius:8px; overflow:hidden; }
  .log-item-header {
    display:flex; align-items:center; justify-content:space-between;
    gap:1rem; padding:0.85rem 1rem; cursor:pointer;
    transition:background .15s;
  }
  .log-item-header:hover { background:#EAEAEA; }
  .log-item-body {
    max-height:0; overflow:hidden;
    transition:max-height 0.25s ease, padding 0.2s ease;
    padding:0 1rem;
    font-size:0.83rem; color:#555; white-space:pre-line; line-height:1.65;
    border-top:0px solid rgba(0,55,100,0.08);
  }
  .log-item.open .log-item-body {
    max-height:600px;
    padding:0.75rem 1rem 1rem;
    border-top-width:1px;
  }
  .log-chevron { transition:transform 0.2s; font-size:18px; color:#9EA2A2; flex-shrink:0; }
  .log-item.open .log-chevron { transform:rotate(180deg); }
</style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="auth-screen" style="display:none;position:fixed;inset:0;z-index:200;background:#F9F9F7;display:flex;align-items:center;justify-content:center;">
  <div style="background:#FFFFFF;border:1px solid rgba(0,55,100,0.10);border-top:3px solid #C4972A;border-radius:16px;box-shadow:0 8px 40px rgba(0,55,100,0.12);padding:2.75rem 2.25rem;width:100%;max-width:360px;text-align:center;">
    <span style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;background:#003764;margin-bottom:1.25rem;">
      <span class="material-symbols-outlined" style="color:#fff;font-size:1.6rem;">admin_panel_settings</span>
    </span>
    <h2 style="font-size:1.4rem;font-weight:900;color:#003764;margin:0 0 0.4rem;">관리자 로그인</h2>
    <p style="font-size:0.84rem;color:#9EA2A2;margin:0 0 1.75rem;">허가된 계정만 접근 가능합니다.</p>
    <button onclick="loginWithGoogle()" type="button"
      style="width:100%;padding:0.9rem;background:#003764;color:#fff;font-family:'Manrope',sans-serif;font-weight:700;font-size:0.9rem;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s;"
      onmouseover="this.style.background='#002549'" onmouseout="this.style.background='#003764'">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36 24 36c-5.2 0-9.6-2.9-11.3-7.1l-6.5 5C9.8 39.7 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.4-2.5 4.4-4.6 5.8l6.2 5.2C40.8 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
      Google 계정으로 로그인
    </button>
  </div>
</div>

<!-- ── 대시보드 ── -->
<div id="dashboard" style="display:none;">

<!-- Nav -->
<nav style="background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,55,100,0.08);position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 1px 10px rgba(0,55,100,0.06);">
  <div style="max-width:1200px;margin:0 auto;padding:0 1.5rem;display:flex;justify-content:space-between;align-items:center;height:60px;">
    <a href="index.html" style="font-family:'Manrope',sans-serif;font-weight:900;font-size:1.1rem;color:#003764;text-decoration:none;letter-spacing:-0.03em;">외대.서버.한국</a>
    <div style="display:flex;gap:1.5rem;align-items:center;" class="nav-desktop">
      <a href="index.html"     style="font-family:'Manrope',sans-serif;font-weight:700;font-size:0.875rem;color:#6b7280;text-decoration:none;" onmouseover="this.style.color='#003764'" onmouseout="this.style.color='#6b7280'">홈</a>
      <a href="mod-setup.html" style="font-family:'Manrope',sans-serif;font-weight:700;font-size:0.875rem;color:#6b7280;text-decoration:none;" onmouseover="this.style.color='#003764'" onmouseout="this.style.color='#6b7280'">모드 설정</a>
      <a href="updates.html"   style="font-family:'Manrope',sans-serif;font-weight:700;font-size:0.875rem;color:#6b7280;text-decoration:none;" onmouseover="this.style.color='#003764'" onmouseout="this.style.color='#6b7280'">업데이트 내역</a>
      <span style="width:1px;height:16px;background:rgba(0,55,100,0.15);"></span>
      <button onclick="logout()" type="button"
        style="display:flex;align-items:center;gap:4px;font-size:0.82rem;color:#9EA2A2;background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:color .15s;"
        onmouseover="this.style.color='#003764'" onmouseout="this.style.color='#9EA2A2'">
        <span class="material-symbols-outlined" style="font-size:17px;">logout</span> 나가기
      </button>
    </div>
    <!-- 모바일: 나가기 버튼만 -->
    <button onclick="logout()" class="nav-mobile-logout"
      style="display:none;align-items:center;gap:4px;font-size:0.82rem;color:#9EA2A2;background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;"
      onmouseover="this.style.color='#003764'" onmouseout="this.style.color='#9EA2A2'">
      <span class="material-symbols-outlined" style="font-size:17px;">logout</span>
    </button>
  </div>
</nav>

<main style="max-width:1200px;margin:0 auto;padding:88px 2rem 4rem;">

  <!-- Header -->
  <header style="margin-bottom:2rem;">
    <div style="width:44px;height:3px;background:#C4972A;border-radius:2px;margin-bottom:0.9rem;"></div>
    <h1 style="font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:900;color:#003764;margin:0 0 0.25rem;letter-spacing:-0.04em;">관리자 대시보드</h1>
    <p style="color:#9EA2A2;font-size:0.88rem;margin:0;">서버 환경을 관리합니다.</p>
  </header>

  <!-- ── 환경 설정: 상단 가로 배치 ── -->
  <section style="background:#FFFFFF;border:1px solid rgba(0,55,100,0.09);border-top:3px solid #C4972A;border-radius:12px;padding:1.5rem 2rem;margin-bottom:1.5rem;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;">
      <span class="material-symbols-outlined" style="font-size:1.2rem;color:#C4972A;">settings_input_component</span>
      <h2 style="font-size:1rem;font-weight:800;color:#003764;margin:0;">환경 설정</h2>
    </div>
    <div class="env-row">

      <!-- 서버 상태 토글 -->
      <div class="env-toggle-box" style="display:flex;align-items:center;gap:1rem;background:#F4F4F4;border-radius:10px;padding:0.85rem 1.25rem;flex-shrink:0;">
        <span style="position:relative;display:inline-flex;width:10px;height:10px;flex-shrink:0;">
          <span id="status-ping" style="position:absolute;inset:0;border-radius:50%;background:#22c55e;opacity:0.6;animation:ping 1.4s cubic-bezier(0,0,0.2,1) infinite;"></span>
          <span id="status-core" style="position:relative;z-index:1;border-radius:50%;width:10px;height:10px;background:#22c55e;"></span>
        </span>
        <div>
          <span style="display:block;font-size:0.65rem;font-weight:800;color:#9EA2A2;text-transform:uppercase;letter-spacing:0.09em;line-height:1;margin-bottom:2px;">서버 상태</span>
          <span id="admin-server-status-text" style="font-family:'Manrope',sans-serif;font-size:0.92rem;font-weight:800;color:#003764;">가동</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-left:0.5rem;">
          <div id="toggle-track" class="toggle-track on" onclick="toggleServer()" style="cursor:pointer;">
            <div class="toggle-thumb"></div>
          </div>
          <span id="server-enabled-label" style="font-size:0.8rem;font-weight:700;color:#003764;min-width:28px;">가동</span>
        </div>
      </div>

      <!-- 버전 입력 -->
      <div class="version-block">
        <div style="flex-shrink:0;">
          <span style="display:block;font-size:0.65rem;font-weight:800;color:#9EA2A2;text-transform:uppercase;letter-spacing:0.09em;line-height:1;margin-bottom:2px;">마크 서버 버전</span>
          <span style="font-size:0.78rem;color:#9EA2A2;">현재: <span id="admin-public-version-text" style="font-weight:700;color:#003764;"></span></span>
        </div>
        <input id="public-mc-version-input" type="text" placeholder="예: 1.21.11"
          style="background:#F4F4F4;border:1px solid rgba(0,55,100,0.12);padding:0.7rem 0.9rem;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;color:#003764;outline:none;transition:border-color .15s,box-shadow .15s;"/>
        <button onclick="applyPublicMinecraftVersion()" type="button"
          style="padding:0.7rem 1.1rem;background:#C4972A;color:#fff;font-family:'Manrope',sans-serif;font-weight:700;font-size:0.82rem;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s;"
          onmouseover="this.style.background='#a97c20'" onmouseout="this.style.background='#C4972A'">적용</button>
      </div>

    </div>
  </section>

  <!-- ── 메인 그리드: 로그 작성 + 게시된 로그 ── -->
  <div class="main-grid">

    <!-- 업데이트 로그 작성 -->
    <section style="background:#FFFFFF;border:1px solid rgba(0,55,100,0.09);border-top:3px solid #003764;border-radius:12px;padding:2rem;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.75rem;">
        <div>
          <h2 style="font-size:1.15rem;font-weight:800;color:#003764;margin:0 0 4px;">업데이트 로그 작성</h2>
          <p style="font-size:0.82rem;color:#9EA2A2;margin:0;">버전 배포와 주요 변경 사항을 기록합니다.</p>
        </div>
        <span class="material-symbols-outlined" style="font-size:1.6rem;color:#C4972A;">history_edu</span>
      </div>

      <form onsubmit="submitUpdate(event)" style="display:flex;flex-direction:column;gap:1rem;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <label style="display:block;font-size:0.7rem;font-weight:800;color:#9EA2A2;text-transform:uppercase;letter-spacing:0.09em;margin-bottom:6px;">버전 태그</label>
            <input id="input-version" type="text" placeholder="예: v 26.3.21" required/>
          </div>
          <div>
            <label style="display:block;font-size:0.7rem;font-weight:800;color:#9EA2A2;text-transform:uppercase;letter-spacing:0.09em;margin-bottom:6px;">배포 날짜</label>
            <input id="input-date" type="date" required/>
          </div>
        </div>
        <div>
          <label style="display:block;font-size:0.7rem;font-weight:800;color:#9EA2A2;text-transform:uppercase;letter-spacing:0.09em;margin-bottom:6px;">로그 제목</label>
          <input id="input-title" type="text" placeholder="주요 변경 사항 요약" required/>
        </div>
        <div>
          <label style="display:block;font-size:0.7rem;font-weight:800;color:#9EA2A2;text-transform:uppercase;letter-spacing:0.09em;margin-bottom:6px;">상세 내용</label>
          <textarea id="input-content" rows="6" placeholder="변경 사항을 상세히 기록해 주세요."></textarea>
        </div>
        <div id="submit-msg" style="display:none;font-size:0.83rem;font-weight:700;padding:0.7rem 1rem;border-radius:8px;"></div>
        <div style="display:flex;justify-content:flex-end;">
          <button id="submit-btn" type="submit"
            style="background:#003764;color:#fff;font-family:'Manrope',sans-serif;font-weight:700;font-size:0.875rem;padding:0.75rem 1.75rem;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;"
            onmouseover="this.style.background='#002549'" onmouseout="this.style.background='#003764'">
            <span class="material-symbols-outlined" style="font-size:17px;">publish</span> 변경 게시
          </button>
        </div>
      </form>
    </section>

    <!-- 게시된 로그 목록 -->
    <section style="background:#FFFFFF;border:1px solid rgba(0,55,100,0.09);border-top:3px solid #9EA2A2;border-radius:12px;padding:1.75rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
        <h2 style="font-size:1rem;font-weight:800;color:#003764;margin:0;">게시된 로그</h2>
        <button onclick="loadAdminLogs()" type="button"
          style="font-size:0.75rem;color:#9EA2A2;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;font-family:'Noto Sans KR',sans-serif;transition:color .15s;"
          onmouseover="this.style.color='#003764'" onmouseout="this.style.color='#9EA2A2'">
          <span class="material-symbols-outlined" style="font-size:15px;">refresh</span> 새로고침
        </button>
      </div>
      <div id="admin-log-list" style="display:flex;flex-direction:column;gap:0.6rem;">
        <p style="font-size:0.85rem;color:#9EA2A2;">불러오는 중...</p>
      </div>
    </section>

  </div>
</main>

<!-- Footer -->
<footer style="background:#F4F4F2;border-top:1px solid rgba(0,55,100,0.08);padding:2.25rem 2rem;">
  <div style="max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:0.75rem;">
    <div>
      <p style="font-family:'Manrope',sans-serif;font-weight:800;color:#003764;font-size:0.9rem;margin:0 0 2px;">외대.서버.한국</p>
      <p style="color:#9EA2A2;font-size:0.78rem;margin:0;">© 2024 외대.서버.한국. All rights reserved.</p>
    </div>
    <span style="font-family:'Manrope',sans-serif;font-size:0.8rem;font-weight:700;color:#C4972A;">관리자</span>
  </div>
</footer>

</div><!-- /dashboard -->

<script>
  const SUPABASE_URL = 'https://ggdzsdhpjamgvsrpxspg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdnZHpzZGhwamFtZ3ZzcnB4c3BnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDE2MDAsImV4cCI6MjA4OTU3NzYwMH0.Bfl4A2PDughSw_Loc918IgVSWWsfkyzNtUxlFP7rLVo';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const S_EN  = 'serverEnabled';
  const S_VER = 'publicMinecraftVersion';
  const DEF_EN  = true;
  const DEF_VER = '1.21.11';

  function getEnabled() { const v=localStorage.getItem(S_EN); return v===null?DEF_EN:v==='true'; }
  function getVersion()  { return localStorage.getItem(S_VER)||DEF_VER; }

  function renderAdminUI() {
    const on = getEnabled();
    const track = document.getElementById('toggle-track');
    const label = document.getElementById('server-enabled-label');
    const statusText = document.getElementById('admin-server-status-text');
    const statusPing = document.getElementById('status-ping');
    const statusCore = document.getElementById('status-core');
    const vInput = document.getElementById('public-mc-version-input');
    const vText  = document.getElementById('admin-public-version-text');
    if (!track) return;
    if (on) { track.classList.add('on'); } else { track.classList.remove('on'); }
    if (label) label.textContent = on ? '가동' : '점검';
    if (statusText) statusText.textContent = on ? '가동' : '점검 중';
    if (statusPing) statusPing.style.background = on ? '#22c55e' : '#ef4444';
    if (statusCore) statusCore.style.background = on ? '#22c55e' : '#ef4444';
    const v = getVersion();
    if (vInput) vInput.value = v;
    if (vText)  vText.textContent = v;
  }

  window.toggleServer = function() {
    localStorage.setItem(S_EN, getEnabled() ? 'false' : 'true');
    renderAdminUI();
  };

  window.applyPublicMinecraftVersion = function() {
    const v = document.getElementById('public-mc-version-input').value.trim();
    if (!v) return;
    localStorage.setItem(S_VER, v);
    renderAdminUI();
  };

  window.addEventListener('storage', e => {
    if (e.key === S_EN || e.key === S_VER) renderAdminUI();
  });

  // ── Auth ──
  async function checkAuth() {
    const { data:{ session } } = await sb.auth.getSession();
    const authEl  = document.getElementById('auth-screen');
    const dashEl  = document.getElementById('dashboard');
    if (!authEl || !dashEl) return;
    if (session) {
      authEl.style.display = 'none';
      dashEl.style.display = 'block';
      renderAdminUI();
      loadAdminLogs();
    } else {
      authEl.style.display = 'flex';
      dashEl.style.display = 'none';
    }
  }

  window.loginWithGoogle = async function() {
    await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.href } });
  };
  window.logout = async function() {
    await sb.auth.signOut();
    checkAuth();
  };

  sb.auth.onAuthStateChange(function(_event, session) {
    checkAuth();
    if (session) loadAdminLogs();
  });

  // ── Update log submit ──
  async function submitUpdate(e) {
    e.preventDefault();
    const btn  = document.getElementById('submit-btn');
    const msg  = document.getElementById('submit-msg');
    const version = document.getElementById('input-version').value.trim();
    const date    = document.getElementById('input-date').value;
    const title   = document.getElementById('input-title').value.trim();
    const content = document.getElementById('input-content').value.trim();

    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:17px;">progress_activity</span> 게시 중...';

    const { error } = await sb.from('updates').insert({ version, release_date: date, title, content });
    if (error) {
      msg.textContent = '❌ 오류: ' + error.message;
      msg.style.background = '#FEF2F2'; msg.style.color = '#B91C1C';
    } else {
      msg.textContent = '✅ 성공적으로 게시되었습니다.';
      msg.style.background = '#ECFDF5'; msg.style.color = '#065F46';
      e.target.reset();
      loadAdminLogs();
    }
    msg.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:17px;">publish</span> 변경 게시';
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  }
  window.submitUpdate = submitUpdate;

  function escHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── 아코디언 토글 ──
  window.toggleLogItem = function(id) {
    const el = document.getElementById('log-item-' + id);
    if (!el) return;
    el.classList.toggle('open');
  };

  async function loadAdminLogs() {
    const container = document.getElementById('admin-log-list');
    if (!container) return;
    const { data, error } = await sb.from('updates').select('*').order('release_date',{ascending:false});
    if (error || !data || data.length === 0) {
      container.innerHTML = '<p style="font-size:0.85rem;color:#9EA2A2;">게시된 로그가 없습니다.</p>';
      return;
    }
    container.innerHTML = data.map(row => `
      <div class="log-item" id="log-item-${row.id}">
        <div class="log-item-header" onclick="toggleLogItem('${row.id}')">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
              <span style="font-size:0.72rem;font-weight:800;background:#003764;color:#fff;padding:2px 8px;border-radius:99px;font-family:'Manrope',sans-serif;flex-shrink:0;">${escHtml(row.version)}</span>
              <span style="font-size:0.75rem;color:#9EA2A2;flex-shrink:0;">${row.release_date??''}</span>
            </div>
            <p style="font-weight:700;font-size:0.875rem;color:#003764;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(row.title)}</p>
          </div>
          <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
            <span class="material-symbols-outlined log-chevron">expand_more</span>
            <button onclick="event.stopPropagation();deleteLog('${row.id}')" type="button"
              style="background:none;border:none;cursor:pointer;color:#9EA2A2;transition:color .15s;padding:2px;display:flex;align-items:center;"
              onmouseover="this.style.color='#B91C1C'" onmouseout="this.style.color='#9EA2A2'" title="삭제">
              <span class="material-symbols-outlined" style="font-size:18px;">delete</span>
            </button>
          </div>
        </div>
        ${row.content ? `<div class="log-item-body">${escHtml(row.content)}</div>` : ''}
      </div>
    `).join('');
  }
  window.loadAdminLogs = loadAdminLogs;

  async function deleteLog(id) {
    if (!confirm('이 로그를 삭제할까요?')) return;
    const { error } = await sb.from('updates').delete().eq('id', id);
    if (!error) loadAdminLogs();
  }
  window.deleteLog = deleteLog;
</script>
</body>
</html>
