<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>공지사항 - 외대.서버.한국</title>
<link rel="icon" href="favicon.ico" type="image/x-icon"/>
<link rel="apple-touch-icon" href="favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="site.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
main{flex:1;max-width:1280px;margin:0 auto;padding:2.75rem clamp(1.25rem,4vw,2.5rem) 5rem;width:100%;position:relative;z-index:1;}
.page-hero{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border-layer);}
.page-hero h1{
  font-family:'Manrope',sans-serif;font-weight:900;
  font-size:clamp(2.1rem,4.5vw,3.35rem);
  color:var(--primary);margin:0;letter-spacing:-.06em;line-height:1.05;
}
.page-lead{color:var(--text-dim);font-size:.88rem;margin:.65rem 0 0;max-width:520px;line-height:1.75;}
.gold-rule{display:flex;align-items:center;gap:.65rem;margin-bottom:.85rem;}
.gold-rule-bar{width:3px;height:44px;background:var(--accent);border-radius:2px;}
.notice-stack{display:flex;flex-direction:column;gap:1rem;}
</style>
</head>
<body>

<nav class="site-nav" id="mnav">
  <div class="nav-i">
    <a href="index.html" class="nav-logo"><span class="nav-dot"></span>외대.서버.한국</a>
    <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="메뉴 열기">
      <i class="msym msym-nav">menu</i>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="nl">홈</a>
      <a href="mod-setup.html" class="nl">모드 설정</a>
      <a href="updates.html" class="nl">업데이트 내역</a>
      <a href="notices.html" class="nl nl-act">공지사항</a>
      <a href="map.html" class="nl">서버 지도</a>
    </div>
  </div>
</nav>

<main>
  <section class="page-hero reveal">
    <div class="gold-rule">
      <div class="gold-rule-bar"></div>
      <h1>공지사항</h1>
    </div>
    <p class="page-lead">서버 운영 관련 중요 사항과 공지를 확인하세요. 제목을 누르면 내용이 펼쳐집니다.</p>
  </section>
  <div id="notices-list" class="reveal">
    <div class="loading-row">
      <i class="msym spin">progress_activity</i> 불러오는 중...
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-i">
    <p>© 2026 외대.서버.한국. All rights reserved.</p>
    <a href="admin.html" style="display:none;" aria-hidden="true">Admin</a>
  </div>
</footer>

<script>
/* SB_URL / SB_KEY는 config.js에서 로드됩니다 */
const sb=supabase.createClient(SB_URL,SB_KEY);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmtDate(iso){if(!iso)return'';if(/^\d{4}-\d{2}-\d{2}$/.test(iso)){const[y,m,d]=iso.split('-');return y+'년 '+Number(m)+'월 '+Number(d)+'일';}return new Date(iso).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});}
function ago(iso){
  const d=new Date(iso);
  if(isNaN(d))return'';
  const m=Math.floor((Date.now()-d)/60000);
  if(m<1)return'방금 전';if(m<60)return m+'분 전';
  const h=Math.floor(m/60);if(h<24)return h+'시간 전';
  const day=Math.floor(h/24);if(day<7)return day+'일 전';
  return fmtDate(iso);
}
window.toggleNotice=function(id){document.querySelector('[data-nid="'+id+'"]')?.classList.toggle('open');};

(function(){
  const t=document.getElementById('nav-toggle'),links=document.getElementById('nav-links');
  if(!t||!links)return;
  t.addEventListener('click',()=>{
    const o=!links.classList.contains('open');
    links.classList.toggle('open',o);
    t.setAttribute('aria-expanded',o);
    t.setAttribute('aria-label',o?'메뉴 닫기':'메뉴 열기');
    document.body.classList.toggle('nav-open',o);
  });
  links.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{
    links.classList.remove('open');
    t.setAttribute('aria-expanded','false');
    t.setAttribute('aria-label','메뉴 열기');
    document.body.classList.remove('nav-open');
  }));
})();
window.addEventListener('scroll',()=>document.getElementById('mnav')?.classList.toggle('scrolled',scrollY>16),{passive:true});
const io=new IntersectionObserver((ents)=>{ents.forEach(e=>{if(e.isIntersecting){e.target.classList.add('reveal-in');io.unobserve(e.target);}});},{threshold:.1,rootMargin:'0px 0px -36px 0px'});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

async function loadNotices(){
  const el=document.getElementById('notices-list');
  try{
    /* 정렬 기준: created_at 내림차순.
       admin에서 created_at을 직접 수정하면 순서가 왜곡됩니다.
       → admin 측 created_at 불변 처리 필수.
         수정 시각이 필요하다면 updated_at 컬럼을 별도 추가하세요. */
    const{data,error}=await sb.from('notices').select('*').order('created_at',{ascending:false});
    if(error)throw error;
    const all=data||[];
    if(!all.length){
      el.innerHTML=`<div class="notice-item p-lg text-center"><i class="msym msym-2xl c-muted" style="display:block;margin-bottom:.75rem;">campaign</i><p class="font-display fw-800 c-navy mb-xs" style="font-size:1.05rem;">현재 공지사항이 없습니다</p><p class="c-dim mb-0" style="font-size:.84rem;">새로운 공지가 등록되면 이 곳에 표시됩니다.</p></div>`;
      return;
    }
    el.innerHTML=`<div class="notice-stack">`+all.map((r,i)=>{
      const titleText=r.title||r.content.split('\n')[0].slice(0,60)+((!r.title&&(r.content.length>60||r.content.includes('\n')))?'…':'');
      const displayDate=r.notice_date?fmtDate(r.notice_date):null;
      const lineDate=displayDate||fmtDate(r.created_at);
      return `<div class="notice-item fu" data-nid="${r.id}" style="animation-delay:${i*.05}s">
        <div class="notice-hd" onclick="toggleNotice('${r.id}')">
          <i class="msym msym-md flex-shrink-0 c-navy">notifications</i>
          <div class="flex-1 min-w-0"><p class="font-display fw-800 c-navy truncate" style="font-size:.96rem;letter-spacing:-.02em;margin:0;">${esc(titleText)}</p></div>
          <div class="d-flex flex-col align-end flex-shrink-0 gap-xs" style="margin-right:.35rem;">
            <span class="font-display fw-600 fs-xs c-dim nowrap">${ago(r.created_at)}</span>
            <span class="font-display fw-800 c-gold nowrap" style="font-size:.68rem;">${lineDate}</span>
          </div>
          <i class="msym chev">expand_more</i>
        </div>
        <div class="notice-body">${displayDate?`<div class="date-badge"><i class="msym msym-xs">calendar_today</i>${displayDate}</div>\n`:''}${esc(r.content)}</div>
      </div>`;
    }).join('')+`</div>`;
  }catch(e){
    el.innerHTML=`<div class="notice-item p-lg text-center"><p class="c-dim fs-base mb-0">공지를 불러오지 못했습니다.</p></div>`;
  }
}
loadNotices();
</script>
</body>
</html>
