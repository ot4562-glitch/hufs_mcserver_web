<head>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --color-bg: #F9F9F7;
  --color-navy: #003764;
  --color-gold: #C4972A;
  --color-gray: #9EA2A2;
  --transition-base: all 0.2s ease;
  --hover-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

:root { --hover-shadow:0 10px 25px rgba(0,0,0,0.08); --transition-base:all .2s ease; }
* { box-sizing: border-box; }
a, button { transition: var(--transition-base); }
body { font-family: 'Noto Sans KR', sans-serif; background: #F9F9F7; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
.msym { font-family: 'Material Symbols Outlined'; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; font-style: normal; line-height: 1; display: inline-block; }

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.9s linear infinite; display: inline-block; }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.fu { animation: fadeUp 0.4s both; }

nav { background:rgba(255,255,255,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,55,100,.08);position:sticky;top:0;z-index:100;box-shadow:0 1px 10px rgba(0,55,100,.06); }
.nav-i { max-width:1200px;margin:0 auto;padding:0 1.25rem;display:flex;justify-content:space-between;align-items:center;height:54px; }
.nav-links { display:flex;gap:1.5rem;align-items:center; }
.nl { font-family:'Manrope',sans-serif;font-weight:700;font-size:.875rem;text-decoration:none;transition:color .15s; }
.nl-act { color:#003764;border-bottom:2px solid #003764;padding-bottom:1px; }
.nl-def { color:#9EA2A2; }
.nl-def:hover { color:#003764; }

/* 공지 아코디언 */
.notice-item {
  background: #FFFFFF;
  border: 1px solid rgba(0,55,100,.09);
  border-left: 3px solid #C4972A;
  border-radius: 12px;
  overflow: hidden;
  transition: var(--transition-base);
  box-shadow:none;
}
.notice-item:hover { box-shadow: var(--hover-shadow); transform:translateY(-2px); border-color:rgba(196,151,42,.55); }

.notice-hd {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: 1.1rem 1.5rem;
  cursor: pointer;
  user-select: none;
  transition: var(--transition-base);
}
.notice-hd:hover { background: #FAFAF8; }

.notice-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease, padding .25s ease;
  padding: 0 1.5rem;
  font-size: .875rem;
  color: #9EA2A2;
  line-height: 1.75;
  white-space: pre-line;
  border-top: 0px solid rgba(0,55,100,.07);
}
.notice-item.open .notice-body {
  max-height: 1200px;
  padding: .9rem 1.5rem 1.35rem;
  border-top-width: 1px;
}

.chev { transition: transform .25s; font-size: 20px; color: #9EA2A2; flex-shrink: 0; }
.notice-item.open .chev { transform: rotate(180deg); }

main { flex: 1; }

@media (max-width: 640px) {
  .nav-links .nl-def { display: none; }
  main { padding: 1.25rem 1rem 3rem !important; }
  h1 { font-size: clamp(1.8rem,7vw,2.6rem) !important; }
  .notice-hd { padding: .9rem 1.1rem !important; }
  .notice-body { padding: 0 1.1rem !important; font-size: .83rem !important; }
  .notice-item.open .notice-body { padding: .75rem 1.1rem 1.1rem !important; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-i">
    <a href="index.html" style="font-family:'Manrope',sans-serif;font-weight:900;font-size:1rem;color:#003764;text-decoration:none;letter-spacing:-.03em;flex-shrink:0;">외대.서버.한국</a>
    <div class="nav-links">
      <a href="index.html"     class="nl nl-def">홈</a>
      <a href="mod-setup.html" class="nl nl-def">모드 설정</a>
      <a href="updates.html"   class="nl nl-def">업데이트 내역</a>
      <a href="notices.html"   class="nl nl-act">공지사항</a>
      <a href="map.html"       class="nl nl-def">서버 지도</a>
    </div>
  </div>
</nav>

<main style="max-width:1200px;margin:0 auto;padding:2.8rem 1.25rem 4rem;width:100%;">

  <!-- 페이지 헤더 -->
  <section style="margin-bottom:2.5rem;">
    <div style="width:44px;height:3px;background:#C4972A;border-radius:2px;margin-bottom:.9rem;"></div>
    <h1 style="font-family:'Manrope',sans-serif;font-weight:900;font-size:clamp(2.2rem,4.5vw,3.2rem);color:#003764;margin:0 0 .75rem;letter-spacing:-.04em;line-height:1.05;">공지사항</h1>
    <p style="color:#9EA2A2;font-size:.92rem;margin:0;max-width:600px;line-height:1.65;">서버 운영 관련 중요 사항과 공지를 확인하세요. 제목을 클릭하면 내용을 볼 수 있습니다.</p>
  </section>

  <div style="height:1px;background:linear-gradient(90deg,rgba(196,151,42,.15),#C4972A,rgba(196,151,42,.15));margin:0 0 1.25rem;"></div>

  <!-- 공지 목록 -->
  <div id="notices-list">
    <div style="display:flex;align-items:center;justify-content:center;padding:4rem 0;color:#9EA2A2;gap:8px;font-size:.88rem;">
      <i class="msym spin">progress_activity</i> 불러오는 중...
    </div>
  </div>

</main>

<footer style="background:#F9F9F7;border-top:1px solid rgba(0,55,100,.08);padding:1.75rem 1.25rem;">
  <div style="max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:.5rem;">
    <p style="color:#9EA2A2;font-size:.76rem;margin:0;">© 2026 외대.서버.한국. All rights reserved.</p>
    <a href="admin.html" style="font-family:'Manrope',sans-serif;font-weight:700;font-size:.78rem;color:#003764;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">Admin</a>
  </div>
</footer>

<script>
const SB_URL='https://ggdzsdhpjamgvsrpxspg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdnZHpzZGhwamFtZ3ZzcnB4c3BnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDE2MDAsImV4cCI6MjA4OTU3NzYwMH0.Bfl4A2PDughSw_Loc918IgVSWWsfkyzNtUxlFP7rLVo';
const sb = supabase.createClient(SB_URL, SB_KEY);
const g = id => document.getElementById(id);

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtDate(iso){
  if(!iso) return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(iso)){
    const[y,m,d]=iso.split('-');
    return y+'년 '+Number(m)+'월 '+Number(d)+'일';
  }
  return new Date(iso).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
}
function ago(iso){
  const m=Math.floor((Date.now()-new Date(iso).getTime())/60000);
  if(m<1)return'방금 전'; if(m<60)return m+'분 전';
  const h=Math.floor(m/60); if(h<24)return h+'시간 전';
  const day=Math.floor(h/24); if(day<7)return day+'일 전';
  return fmtDate(iso);
}

window.toggleNotice = function(id){
  const item = document.querySelector('[data-nid="'+id+'"]');
  if(item) item.classList.toggle('open');
};

async function loadNotices(){
  const el = g('notices-list');
  try{
    const{data, error} = await sb.from('notices').select('*').order('created_at',{ascending:false});
    if(error) throw error;

    const all = data || [];

    if(!all.length){
      el.innerHTML = `
        <div style="background:#fff;border:1px solid rgba(0,55,100,.09);border-radius:12px;padding:3.5rem 2rem;text-align:center;">
          <i class="msym" style="font-size:2.5rem;color:#E0DDD8;display:block;margin-bottom:.75rem;">campaign</i>
          <p style="font-family:'Manrope',sans-serif;font-weight:800;font-size:1.1rem;color:#003764;margin:0 0 .4rem;">현재 공지사항이 없습니다</p>
          <p style="color:#9EA2A2;font-size:.86rem;margin:0;">새로운 공지가 등록되면 이 곳에 표시됩니다.</p>
        </div>`;
      return;
    }

    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:.75rem;">` +
      all.map((r, i) => {
        const titleText = r.title || r.content.split('\n')[0].slice(0,60) + ((!r.title && (r.content.length>60 || r.content.includes('\n'))) ? '…' : '');
        const displayDate = r.notice_date ? fmtDate(r.notice_date) : null;
        return `
        <div class="notice-item fu" data-nid="${r.id}" style="animation-delay:${i*.055}s">
          <div class="notice-hd" onclick="toggleNotice('${r.id}')">
            <i class="msym" style="color:#C4972A;font-size:1.15rem;flex-shrink:0;">notifications</i>
            <div style="flex:1;min-width:0;">
              <p style="font-family:'Manrope',sans-serif;font-weight:800;font-size:.92rem;color:#003764;margin:0;letter-spacing:-.015em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(titleText)}</p>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;margin-right:.35rem;">
              <span style="font-size:.72rem;color:#9EA2A2;white-space:nowrap;">${ago(r.created_at)}</span>
              ${displayDate ? `<span style="font-size:.68rem;color:#C4972A;font-weight:700;white-space:nowrap;">${displayDate}</span>` : `<span style="font-size:.68rem;color:#C0BDB9;white-space:nowrap;">${fmtDate(r.created_at)}</span>`}
            </div>
            <i class="msym chev">expand_more</i>
          </div>
          <div class="notice-body">${displayDate ? `<div style="display:inline-flex;align-items:center;gap:4px;background:#FFF9EC;border:1px solid #E8C96A;border-radius:6px;padding:3px 9px;margin-bottom:.75rem;font-size:.76rem;font-weight:700;color:#C4972A;"><i class="msym" style="font-size:13px;">calendar_today</i>${displayDate}</div>\n` : ''}${esc(r.content)}</div>
        </div>`;
      }).join('') + `</div>`;
  } catch(e) {
    el.innerHTML = `
      <div style="background:#fff;border:1px solid rgba(0,55,100,.09);border-radius:12px;padding:2.5rem;text-align:center;">
        <p style="color:#9EA2A2;font-size:.9rem;margin:0;">공지를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</p>
      </div>`;
  }
}

loadNotices();
</script>
</body>
