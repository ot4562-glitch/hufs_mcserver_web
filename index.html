<script>
  const STORAGE_SERVER_ENABLED = 'serverEnabled';
  const STORAGE_PUBLIC_MC_VERSION = 'publicMinecraftVersion';
  const DEFAULT_SERVER_ENABLED = true;
  const DEFAULT_PUBLIC_MC_VERSION = '1.21.11';

  function getServerEnabled() {
    const raw = localStorage.getItem(STORAGE_SERVER_ENABLED);
    if (raw === null) return DEFAULT_SERVER_ENABLED;
    return raw === 'true';
  }

  function getPublicMinecraftVersion() {
    const raw = localStorage.getItem(STORAGE_PUBLIC_MC_VERSION);
    return raw ? raw : DEFAULT_PUBLIC_MC_VERSION;
  }

  function renderServerStatus() {
    const enabled = getServerEnabled();
    const statusTextEl = document.getElementById('server-status-text');
    const versionTextEl = document.getElementById('server-version-text');
    const pingOnEl = document.getElementById('status-dot-ping-on');
    const pingOffEl = document.getElementById('status-dot-ping-off');
    const coreOnEl = document.getElementById('status-dot-core-on');
    const coreOffEl = document.getElementById('status-dot-core-off');

    if (!statusTextEl || !versionTextEl || !pingOnEl || !pingOffEl || !coreOnEl || !coreOffEl) return;

    versionTextEl.textContent = getPublicMinecraftVersion();
    if (enabled) {
      statusTextEl.textContent = '서버 가동 중';
      pingOnEl.classList.remove('hidden');
      coreOnEl.classList.remove('hidden');
      pingOffEl.classList.add('hidden');
      coreOffEl.classList.add('hidden');
    } else {
      statusTextEl.textContent = '서버 점검 중';
      pingOnEl.classList.add('hidden');
      coreOnEl.classList.add('hidden');
      pingOffEl.classList.remove('hidden');
      coreOffEl.classList.remove('hidden');
    }
  }

  renderServerStatus();
  setInterval(renderServerStatus, 2000);
</script>
